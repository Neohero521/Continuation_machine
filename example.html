<!-- ==============================================
     第一部分：SillyTavern扩展面板入口（必须保留）
     严格遵循官方模板结构，确保扩展列表正常显示
     ============================================== -->
<div class="example-extension-settings">
    <div class="inline-drawer">
        <div class="inline-drawer-toggle inline-drawer-header">
            <b>彩云小梦完美复刻版</b>
            <div class="inline-drawer-icon fa-solid fa-circle-chevron-down down"></div>
        </div>
        <div class="inline-drawer-content">
            <div class="example-extension_block flex-container">
                <input id="open_xiaomeng_editor" class="menu_button primary" type="submit" value="打开彩云小梦编辑器" />
            </div>
            <div class="example-extension_block flex-container">
                <input id="sync_st_content" type="checkbox" checked />
                <label for="sync_st_content">自动同步ST聊天输入框内容</label>
            </div>
            <div class="example-extension_block flex-container">
                <input id="inherit_st_params" type="checkbox" checked />
                <label for="inherit_st_params">继承ST全局AI生成参数</label>
            </div>
            <hr class="sysHR" />
        </div>
    </div>
</div>

<!-- ==============================================
     第二部分：1:1完美还原彩云小梦APP截图UI
     修复所有BUG，支持内容标红、动态操作栏、完全对齐截图
     ============================================== -->
<div id="xiaomeng_full_editor" class="xiaomeng-editor-container">
    <!-- 顶部导航栏 1:1还原截图 -->
    <header class="xiaomeng-header">
        <div class="header-left">
            <button class="header-icon-btn" id="close_editor_btn">
                <i class="fa-solid fa-arrow-left"></i>
            </button>
            <div class="header-logo">
                <i class="fa-solid fa-cloud"></i>
                <span>彩云小梦</span>
            </div>
        </div>

        <div class="header-mode-switch">
            <input type="radio" name="editor_mode" id="mode_v" value="v_mode" checked />
            <label for="mode_v" class="mode-btn">V模式</label>
            <input type="radio" name="editor_mode" id="mode_o" value="o_mode" />
            <label for="mode_o" class="mode-btn">O模式</label>
        </div>

        <div class="header-right">
            <button class="header-icon-btn" title="菜单">
                <i class="fa-solid fa-bars"></i>
            </button>
            <button class="header-icon-btn" title="分享">
                <i class="fa-solid fa-share-nodes"></i>
            </button>
        </div>
    </header>

    <!-- 核心编辑区域 1:1还原截图，支持内容标红 -->
    <main class="xiaomeng-editor-main">
        <div class="editor-content-wrapper">
            <!-- 标题输入框 -->
            <input 
                id="xiaomeng_editor_title" 
                class="editor-title-input" 
                type="text" 
                placeholder="标题"
            />

            <!-- 章节名输入框 -->
            <div class="editor-chapter-row">
                <i class="fa-solid fa-book-open"></i>
                <input 
                    id="xiaomeng_editor_chapter" 
                    class="editor-chapter-input" 
                    type="text" 
                    placeholder="第_章 章节名"
                />
            </div>

            <!-- 正文可编辑区域（替换textarea，支持部分内容标红） -->
            <div 
                id="xiaomeng_editor_textarea" 
                class="editor-main-content" 
                contenteditable="true" 
                placeholder="该开始创建你自己的故事了"
            ></div>

            <!-- 续写操作栏（动态生成，初始隐藏，仅生成续写内容后显示） -->
            <div id="continuation_action_bar" class="editor-action-bar" style="display: none;">
                <div class="action-bar-divider"></div>
                <div class="action-bar-buttons">
                    <button class="action-bar-btn" id="action_undo">撤回</button>
                    <button class="action-bar-btn" id="action_modify">修改</button>
                    <button class="action-bar-btn" id="action_save">保存</button>
                    <button class="action-bar-btn primary" id="action_ai_continue_main">Ai 继续</button>
                </div>
            </div>
        </div>
    </main>

    <!-- 底部固定功能区 1:1还原截图 -->
    <footer class="xiaomeng-footer">
        <!-- 功能选择抽屉 -->
        <div class="footer-function-drawer" id="function_drawer_wrapper">
            <button class="function-toggle-btn" id="function_toggle_btn">
                <i class="fa-solid fa-pen-to-square"></i>
                <span>续写</span>
                <i class="fa-solid fa-chevron-up"></i>
            </button>
            <div class="function-dropdown" id="function_dropdown">
                <button class="dropdown-item" data-function="continuation">续写</button>
                <button class="dropdown-item" data-function="expand">扩写</button>
                <button class="dropdown-item" data-function="shorten">缩写</button>
                <button class="dropdown-item" data-function="rewrite">改写</button>
                <button class="dropdown-item" data-function="custom">定向续写</button>
            </div>
        </div>

        <!-- 自定义指令输入框 -->
        <div class="footer-prompt-input">
            <i class="fa-solid fa-sparkles"></i>
            <input 
                id="xiaomeng_custom_prompt" 
                type="text" 
                placeholder="例: 请帮我增加更多战斗场景的描写"
            />
        </div>

        <!-- 风格选择下拉 -->
        <div class="footer-style-select">
            <select id="xiaomeng_style_select" class="style-select">
                <option value="标准">标准</option>
                <option value="脑洞大开">脑洞大开</option>
                <option value="细节狂魔">细节狂魔</option>
                <option value="纯爱">纯爱</option>
                <option value="言情">言情</option>
                <option value="玄幻">玄幻</option>
                <option value="悬疑">悬疑</option>
            </select>
        </div>

        <!-- 字数选择下拉 -->
        <div class="footer-length-select">
            <select id="xiaomeng_length_select" class="length-select">
                <option value="100">100字</option>
                <option value="200" selected>200字</option>
                <option value="400">400字</option>
            </select>
        </div>

        <!-- AI结果展示区 1:1还原截图布局 -->
        <div class="footer-results-area">
            <div class="results-header">
                <span class="results-title">
                    <i class="fa-solid fa-face-smile"></i>
                    看看小梦AI写的
                </span>
                <button class="refresh-btn" id="refresh_results_btn" disabled>
                    <i class="fa-solid fa-rotate-right"></i>
                    换一批
                </button>
            </div>

            <!-- 横向滚动的结果卡片容器 1:1还原截图 -->
            <div class="results-cards-wrapper" id="results_cards_container">
                <div class="empty-result-tip">点击「Ai 继续」生成多分支内容</div>
            </div>
        </div>

        <!-- 悬浮AI继续按钮（初始显示，生成内容后隐藏，和截图一致） -->
        <button id="float_ai_continue_btn" class="float-ai-btn">
            <i class="fa-solid fa-arrow-up"></i>
        </button>
    </footer>
</div>
