<!-- 扩展入口面板（显示在ST扩展设置页） -->
<div class="cy-xiaomeng-extension-entry">
    <div class="inline-drawer">
        <div class="inline-drawer-toggle inline-drawer-header">
            <b>彩云小梦网页版复刻编辑器</b>
            <div class="inline-drawer-icon fa-solid fa-circle-chevron-down down"></div>
        </div>
        <div class="inline-drawer-content">
            <div class="entry-desc">1:1复刻彩云小梦网页版编辑器的UI与交互，点击下方按钮打开</div>
            <input id="open_editor_btn" class="menu_button primary" type="submit" value="打开彩云小梦风格编辑器" />
            <hr class="sysHR" />
            <div class="settings-block">
                <label for="sync_editor_content"><b>自动同步ST输入框内容</b></label>
                <input id="sync_editor_content" type="checkbox" checked />
                <label for="sync_editor_content">开启后，编辑器内容与聊天输入框双向同步</label>
            </div>
        </div>
    </div>
</div>

<!-- 全屏编辑器主体（完全复刻彩云小梦网页版UI） -->
<div id="cy_xiaomeng_editor" class="cy-editor-fullscreen">
    <!-- 顶部导航栏 -->
    <header class="cy-editor-header">
        <div class="header-left">
            <button class="header-btn" id="close_editor_btn">
                <i class="fa-solid fa-arrow-left"></i>
            </button>
            <div class="header-logo">
                <i class="fa-solid fa-cloud"></i>
                <span>彩云小梦</span>
            </div>
        </div>

        <div class="header-mode">
            <input type="radio" name="editor_mode" id="mode_v" value="v_mode" checked />
            <label for="mode_v" class="mode-btn">V模式</label>
            <input type="radio" name="editor_mode" id="mode_o" value="o_mode" />
            <label for="mode_o" class="mode-btn">O模式</label>
        </div>

        <div class="header-right">
            <button class="header-btn" title="菜单">
                <i class="fa-solid fa-bars"></i>
            </button>
            <button class="header-btn" title="分享">
                <i class="fa-solid fa-share-nodes"></i>
            </button>
            <button class="header-btn member-btn" title="会员中心">
                <i class="fa-solid fa-crown"></i>
            </button>
        </div>
    </header>

    <!-- 核心编辑区域 -->
    <main class="cy-editor-main">
        <div class="editor-content">
            <!-- 标题输入框 -->
            <input 
                id="editor_title" 
                class="editor-title" 
                type="text" 
                placeholder="标题"
            />

            <!-- 章节名输入框 -->
            <div class="editor-chapter">
                <i class="fa-solid fa-book-open"></i>
                <input 
                    id="editor_chapter" 
                    class="chapter-input" 
                    type="text" 
                    placeholder="第_章 章节名"
                />
            </div>

            <!-- 文本编辑框 -->
            <textarea 
                id="editor_textarea" 
                class="editor-textarea" 
                placeholder="开始写下你的故事..."
            ></textarea>
        </div>
    </main>

    <!-- 编辑操作栏（紧贴编辑框下方） -->
    <div class="editor-action-bar">
        <button class="action-btn" id="action_undo">撤回</button>
        <button class="action-btn" id="action_modify">修改</button>
        <button class="action-btn" id="action_save">保存</button>
        <button class="action-btn primary" id="action_ai_continue">AI继续</button>
    </div>

    <!-- 底部固定功能区 -->
    <footer class="cy-editor-footer">
        <!-- 功能抽屉触发区 -->
        <div class="footer-function-drawer" id="function_drawer_trigger">
            <button class="function-btn" id="function_toggle">
                <i class="fa-solid fa-pen-to-square"></i>
                <span>续写</span>
                <i class="fa-solid fa-chevron-up"></i>
            </button>

            <!-- 功能抽屉内容 -->
            <div class="function-drawer-content" id="function_drawer_content">
                <button class="drawer-item" data-function="continuation">
                    <i class="fa-solid fa-arrow-right"></i>
                    <span>续写</span>
                </button>
                <button class="drawer-item" data-function="expand">
                    <i class="fa-solid fa-up-right-and-down-left-from-center"></i>
                    <span>扩写</span>
                </button>
                <button class="drawer-item" data-function="shorten">
                    <i class="fa-solid fa-down-left-and-up-right-to-center"></i>
                    <span>缩写</span>
                </button>
                <button class="drawer-item" data-function="rewrite">
                    <i class="fa-solid fa-rotate-right"></i>
                    <span>改写</span>
                </button>
                <button class="drawer-item" data-function="custom">
                    <i class="fa-solid fa-wand-magic-sparkles"></i>
                    <span>定向续写</span>
                </button>
            </div>
        </div>

        <!-- 自定义指令输入框 -->
        <div class="footer-prompt-input">
            <i class="fa-solid fa-sparkles"></i>
            <input 
                id="custom_prompt_input" 
                type="text" 
                placeholder="例: 请帮我增加更多战斗场景的描写"
            />
        </div>

        <!-- 风格选择下拉 -->
        <div class="footer-style-select">
            <select id="style_select" class="style-select">
                <option value="标准">标准</option>
                <option value="脑洞大开">脑洞大开</option>
                <option value="细节狂魔">细节狂魔</option>
                <option value="纯爱">纯爱</option>
                <option value="言情">言情</option>
                <option value="玄幻">玄幻</option>
                <option value="悬疑">悬疑</option>
                <option value="都市">都市</option>
                <option value="仙侠">仙侠</option>
            </select>
        </div>

        <!-- AI结果展示区 -->
        <div class="footer-results">
            <div class="results-header">
                <span class="results-title">
                    <i class="fa-solid fa-robot"></i>
                    看看小梦AI写的
                </span>
                <button class="refresh-btn" id="refresh_results_btn" disabled>
                    <i class="fa-solid fa-rotate-right"></i>
                    换一批
                </button>
            </div>

            <!-- 横向滚动的结果卡片容器 -->
            <div class="results-cards-container" id="results_cards">
                <div class="empty-tip">点击「AI继续」生成多分支内容</div>
            </div>
        </div>
    </footer>
</div>
