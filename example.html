<!-- 扩展面板入口（必须正确挂载，否则面板里找不到插件） -->
<div class="cy-xiaomeng-extension">
    <div class="inline-drawer">
        <div class="inline-drawer-toggle inline-drawer-header">
            <b>彩云小梦小说续写</b>
            <div class="inline-drawer-icon fa-solid fa-circle-chevron-down down"></div>
        </div>
        <div class="inline-drawer-content">
            <div class="extension-desc">
                1:1复刻彩云小梦网页版编辑器，自动复用SillyTavern当前连接的AI后端，无需额外配置
            </div>
            <div class="extension-btn-group">
                <input id="open_editor_btn" class="menu_button primary" type="button" value="打开续写编辑器" />
            </div>
            <hr class="sysHR" />
            <div class="extension-settings">
                <div class="flex-container">
                    <input id="sync_st_content" type="checkbox" checked />
                    <label for="sync_st_content">自动同步ST聊天输入框内容</label>
                </div>
                <div class="flex-container">
                    <input id="inherit_st_params" type="checkbox" checked />
                    <label for="inherit_st_params">继承ST全局生成参数</label>
                </div>
                <div class="flex-container">
                    <input id="auto_save_content" type="checkbox" checked />
                    <label for="auto_save_content">自动保存编辑内容</label>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- 全屏编辑器主体（1:1复刻彩云小梦网页版） -->
<div id="cy_xiaomeng_editor" class="cy-editor-fullscreen">
    <!-- 顶部导航栏 -->
    <header class="cy-editor-header">
        <div class="header-left">
            <button class="header-btn" id="close_editor_btn" title="返回">
                <i class="fa-solid fa-arrow-left"></i>
            </button>
            <div class="header-logo">
                <i class="fa-solid fa-cloud"></i>
                <span>彩云小梦续写</span>
            </div>
        </div>

        <div class="header-mode">
            <input type="radio" name="editor_mode" id="mode_v" value="v_mode" checked />
            <label for="mode_v" class="mode-btn">V模式</label>
            <input type="radio" name="editor_mode" id="mode_o" value="o_mode" />
            <label for="mode_o" class="mode-btn">O模式</label>
            <span class="mode-tip">V模式严谨贴合 | O模式开放脑洞</span>
        </div>

        <div class="header-right">
            <button class="header-btn" title="保存">
                <i class="fa-solid fa-save"></i>
            </button>
            <button class="header-btn" title="菜单">
                <i class="fa-solid fa-bars"></i>
            </button>
        </div>
    </header>

    <!-- 核心编辑区域 -->
    <main class="cy-editor-main">
        <div class="editor-content">
            <input 
                id="editor_title" 
                class="editor-title" 
                type="text" 
                placeholder="标题"
            />
            <div class="editor-chapter">
                <i class="fa-solid fa-book-open"></i>
                <input 
                    id="editor_chapter" 
                    class="chapter-input" 
                    type="text" 
                    placeholder="第_章 章节名"
                />
            </div>
            <textarea 
                id="editor_textarea" 
                class="editor-textarea" 
                placeholder="开始写下你的故事，AI将为你续写后续内容..."
            ></textarea>
        </div>
    </main>

    <!-- 编辑操作栏（复刻原版底部操作按钮） -->
    <div class="editor-action-bar">
        <button class="action-btn" id="action_undo">撤回</button>
        <button class="action-btn" id="action_modify">修改</button>
        <button class="action-btn" id="action_save">保存</button>
        <button class="action-btn primary" id="action_ai_continue">AI继续</button>
    </div>

    <!-- 底部固定功能区 -->
    <footer class="cy-editor-footer">
        <!-- 功能抽屉 -->
        <div class="footer-function-drawer">
            <button class="function-toggle-btn" id="function_toggle">
                <i class="fa-solid fa-pen-to-square"></i>
                <span id="function_name">续写</span>
                <i class="fa-solid fa-chevron-up"></i>
            </button>
            <div class="function-drawer-content" id="function_drawer">
                <button class="drawer-item" data-func="continuation">
                    <i class="fa-solid fa-arrow-right"></i>
                    <span>续写</span>
                </button>
                <button class="drawer-item" data-func="expand">
                    <i class="fa-solid fa-up-right-and-down-left-from-center"></i>
                    <span>扩写</span>
                </button>
                <button class="drawer-item" data-func="shorten">
                    <i class="fa-solid fa-down-left-and-up-right-to-center"></i>
                    <span>缩写</span>
                </button>
                <button class="drawer-item" data-func="rewrite">
                    <i class="fa-solid fa-rotate-right"></i>
                    <span>改写</span>
                </button>
                <button class="drawer-item" data-func="custom">
                    <i class="fa-solid fa-wand-magic-sparkles"></i>
                    <span>定向续写</span>
                </button>
            </div>
        </div>

        <!-- 自定义指令输入框 -->
        <div class="footer-prompt-input">
            <i class="fa-solid fa-sparkles"></i>
            <input 
                id="custom_prompt" 
                type="text" 
                placeholder="例: 请帮我增加更多战斗场景的描写"
            />
        </div>

        <!-- 风格+字数选择 -->
        <div class="footer-select-group">
            <select id="style_select" class="style-select">
                <option value="标准">标准</option>
                <option value="脑洞大开">脑洞大开</option>
                <option value="细节狂魔">细节狂魔</option>
                <option value="纯爱">纯爱</option>
                <option value="言情">言情</option>
                <option value="玄幻">玄幻</option>
                <option value="悬疑">悬疑</option>
                <option value="都市">都市</option>
                <option value="仙侠">仙侠</option>
            </select>
            <select id="length_select" class="length-select">
                <option value="100">100字</option>
                <option value="200" selected>200字</option>
                <option value="400">400字</option>
                <option value="800">800字</option>
            </select>
        </div>

        <!-- AI结果展示区（横向滚动卡片，复刻原版） -->
        <div class="footer-results">
            <div class="results-header">
                <span class="results-title">
                    <i class="fa-solid fa-robot"></i>
                    看看AI写的
                </span>
                <button class="refresh-btn" id="refresh_btn" disabled>
                    <i class="fa-solid fa-rotate-right"></i>
                    换一批
                </button>
            </div>
            <div class="results-cards" id="results_container">
                <div class="empty-tip">点击「AI继续」生成多分支内容</div>
            </div>
        </div>
    </footer>
</div>
