<!-- 彩云小梦风格小说续写插件UI -->
<div class="cy-novel-continuation-settings">
    <div class="inline-drawer">
        <!-- 插件头部 -->
        <div class="inline-drawer-toggle inline-drawer-header">
            <b>小说续写助手（彩云小梦风格）</b>
            <div class="inline-drawer-icon fa-solid fa-circle-chevron-down down"></div>
        </div>

        <!-- 插件主体内容 -->
        <div class="inline-drawer-content">
            <!-- 1. 模式切换：V模式/O模式 复刻原版顶部切换 -->
            <div class="cy-mode-group">
                <input type="radio" name="cy_mode" id="cy_v_mode" value="v_mode" checked />
                <label for="cy_v_mode" class="cy-mode-btn">V模式</label>
                
                <input type="radio" name="cy_mode" id="cy_o_mode" value="o_mode" />
                <label for="cy_o_mode" class="cy-mode-btn">O模式</label>
                <span class="cy-mode-desc">V模式严谨贴合原文 | O模式开放脑洞创作</span>
            </div>

            <hr class="sysHR" />

            <!-- 2. 核心功能选择：续写/扩写/缩写/改写/定向续写 -->
            <div class="cy-function-block">
                <label for="cy_function_type"><b>功能类型</b></label>
                <select id="cy_function_type" class="menu_select">
                    <option value="continuation">续写（接在文末继续写）</option>
                    <option value="expand">扩写（选中内容丰富细节）</option>
                    <option value="shorten">缩写（选中内容精简压缩）</option>
                    <option value="rewrite">改写（选中内容换风格重写）</option>
                    <option value="custom">定向续写（自定义指令）</option>
                </select>
            </div>

            <!-- 3. 自定义指令输入框 复刻原版左下角的指令输入 -->
            <div class="cy-custom-prompt-block">
                <label for="cy_custom_prompt"><b>自定义指令</b></label>
                <input 
                    id="cy_custom_prompt" 
                    type="text" 
                    class="text_pole" 
                    placeholder="例：请帮我增加更多战斗场景的描写，丰富人物表情动作"
                />
            </div>

            <hr class="sysHR" />

            <!-- 4. 生成字数选择 -->
            <div class="cy-length-block">
                <label><b>生成字数</b></label>
                <div class="cy-length-select-group">
                    <input type="radio" name="cy_length" id="cy_length_100" value="100" />
                    <label for="cy_length_100">100字</label>
                    
                    <input type="radio" name="cy_length" id="cy_length_200" value="200" checked />
                    <label for="cy_length_200">200字</label>
                    
                    <input type="radio" name="cy_length" id="cy_length_400" value="400" />
                    <label for="cy_length_400">400字</label>
                </div>
            </div>

            <!-- 5. 创作风格选择 完全复刻原版下拉选项 -->
            <div class="cy-style-block">
                <label for="cy_style"><b>创作风格</b></label>
                <select id="cy_style" class="menu_select">
                    <option value="标准">标准</option>
                    <option value="脑洞大开">脑洞大开</option>
                    <option value="细节狂魔">细节狂魔</option>
                    <option value="纯爱">纯爱</option>
                    <option value="言情">言情</option>
                    <option value="玄幻">玄幻</option>
                    <option value="悬疑">悬疑</option>
                    <option value="都市">都市</option>
                    <option value="仙侠">仙侠</option>
                </select>
            </div>

            <hr class="sysHR" />

            <!-- 6. 主操作按钮 复刻原版右下角的AI继续 -->
            <div class="cy-button-group">
                <input id="cy_generate_btn" class="menu_button primary" type="submit" value="AI继续" />
                <input id="cy_refresh_btn" class="menu_button" type="submit" value="换一批" disabled />
            </div>

            <!-- 7. 生成结果展示区 复刻原版底部卡片布局 -->
            <div class="cy-results-area">
                <div class="cy-results-header">
                    <b>看看AI写的</b>
                </div>
                <div id="cy_results_container" class="cy-results-container">
                    <div class="cy-empty-tip">点击「AI继续」生成多分支内容</div>
                </div>
            </div>
        </div>
    </div>
</div>
